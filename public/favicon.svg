<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="qcode">
  <!-- iOS-style mint rounded square background -->
  <rect width="64" height="64" rx="14" fill="#16E3C1"/>

  <!-- Terminal prompt glyph: chevron ">" + underscore cursor, centred.
       Reads as a shell prompt, which is what qcode is: a coding agent
       that drives your terminal remotely from your phone. -->

  <!-- Chevron ">" -->
  <path d="M18 20 L32 32 L18 44"
        fill="none"
        stroke="#07090c"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Underscore cursor next to the chevron -->
  <rect x="34" y="40" width="14" height="5" rx="2.5" fill="#07090c"/>
</svg>
