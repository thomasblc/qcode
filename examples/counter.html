<!DOCTYPE html>
<html>
<head>
  <title>Counter</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #counter { font-size: 2em; margin-bottom: 10px; }
    button { margin: 0 5px; }
  </style>
</head>
<body>
  <h1>Counter</h1>
  <div id="counter">0</div>
  <button onclick="add()">+</button>
  <button onclick="subtract()">-</button>
  <script>
    let count = 0;
    function add() { count += 1; document.getElementById('counter').innerText = count; }
    function subtract() { count -= 1; document.getElementById('counter').innerText = count; }
  </script>
</body>
</html>
